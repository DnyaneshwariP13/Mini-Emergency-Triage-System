<div class="dashboard-container">
  <h1>Dashboard</h1>

  <!-- Error -->
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-spinner">Loading dashboard data...</div>

  <!-- Stats Cards -->
  <div class="stats-grid" *ngIf="!isLoading && !error">
    <div class="stat-card total">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <div class="stat-label">Total Patients</div>
        <div class="stat-value">{{ stats.totalPatients }}</div>
      </div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">🚨</div>
      <div class="stat-info">
        <div class="stat-label">Red Priority</div>
        <div class="stat-value">{{ stats.redPriorityPatients }}</div>
      </div>
    </div>
    <div class="stat-card waiting">
      <div class="stat-icon">⏳</div>
      <div class="stat-info">
        <div class="stat-label">Waiting</div>
        <div class="stat-value">{{ stats.waitingPatients }}</div>
      </div>
    </div>
    <div class="stat-card discharged">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <div class="stat-label">Discharged</div>
        <div class="stat-value">{{ stats.dischargedPatients }}</div>
      </div>
    </div>
  </div>

  <!-- Chart Section -->
  <div class="chart-container" *ngIf="!isLoading && !error">
    <h2>Priority Distribution</h2>
    <div class="chart-wrapper">
      <canvas #chartCanvas></canvas>
    </div>
  </div>
</div>
