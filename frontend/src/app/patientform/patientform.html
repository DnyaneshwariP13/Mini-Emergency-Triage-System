<div class="patient-form-container">
  <h2>{{ isEdit ? 'Edit Patient' : 'Register New Patient' }}</h2>

  <!-- Error message display -->
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <form [formGroup]="patientForm" (ngSubmit)="onSubmit()">
    <!-- Patient Name (Required) -->
    <div class="form-group">
      <label for="patientName">Patient Name <span class="required">*</span></label>
      <input
        type="text"
        id="patientName"
        formControlName="patientName"
        placeholder="Enter patient's full name"
        [ngClass]="{'invalid': patientForm.get('patientName')?.invalid && patientForm.get('patientName')?.touched}"
      />
      <span *ngIf="patientForm.get('patientName')?.invalid && patientForm.get('patientName')?.touched" class="error-text">
        Patient Name is required
      </span>
    </div>

    <!-- Age (Required, >0) -->
    <div class="form-group">
      <label for="age">Age <span class="required">*</span></label>
      <input
        type="number"
        id="age"
        formControlName="age"
        placeholder="Enter age in years"
        [ngClass]="{'invalid': patientForm.get('age')?.invalid && patientForm.get('age')?.touched}"
      />
      <span *ngIf="patientForm.get('age')?.invalid && patientForm.get('age')?.touched" class="error-text">
        Age must be greater than 0
      </span>
    </div>

    <!-- Gender (Dropdown) -->
    <div class="form-group">
      <label for="gender">Gender <span class="required">*</span></label>
      <select id="gender" formControlName="gender">
        <option value="">Select Gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
      <span *ngIf="patientForm.get('gender')?.invalid && patientForm.get('gender')?.touched" class="error-text">
        Gender is required
      </span>
    </div>

    <!-- Mobile Number (Required, valid format) -->
    <div class="form-group">
      <label for="mobileNumber">Mobile Number <span class="required">*</span></label>
      <input
        type="text"
        id="mobileNumber"
        formControlName="mobileNumber"
        placeholder="Enter 10-digit mobile number"
        [ngClass]="{'invalid': patientForm.get('mobileNumber')?.invalid && patientForm.get('mobileNumber')?.touched}"
      />
      <span *ngIf="patientForm.get('mobileNumber')?.invalid && patientForm.get('mobileNumber')?.touched" class="error-text">
        Please enter a valid 10-digit mobile number
      </span>
    </div>

    <!-- Chief Complaint (Optional) -->
    <div class="form-group">
      <label for="chiefComplaint">Chief Complaint</label>
      <textarea
        id="chiefComplaint"
        formControlName="chiefComplaint"
        placeholder="Describe the patient's chief complaint"
        rows="3"
      ></textarea>
    </div>

    <!-- Arrival Date & Time -->
    <div class="form-group">
      <label for="arrivalDateTime">Arrival Date and Time <span class="required">*</span></label>
      <input
        type="datetime-local"
        id="arrivalDateTime"
        formControlName="arrivalDateTime"
      />
      <span *ngIf="patientForm.get('arrivalDateTime')?.invalid && patientForm.get('arrivalDateTime')?.touched" class="error-text">
        Arrival date and time is required
      </span>
    </div>

    <!-- Status (Dropdown, default: WAITING) -->
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" formControlName="status">
        <option value="WAITING">Waiting</option>
        <option value="UNDER_TREATMENT">Under Treatment</option>
        <option value="DISCHARGED">Discharged</option>
      </select>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="submit" class="save-button" [disabled]="patientForm.invalid">
        {{ isEdit ? 'Update Patient' : 'Register Patient' }}
      </button>

      <!-- Cancel button - always visible, navigates back to patient list -->
      <button type="button" class="cancel-button" routerLink="/patients">
        Cancel
      </button>

      <div *ngIf="isEdit" class="edit-actions">
       <!--<button type="button" class="cancel-button" routerLink="/patients">
          Cancel
        </button>-->
      </div>
    </div>
  </form>
</div>
